<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#2d1b69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="100" fill="#9333ea" opacity="0.1"/>
  <circle cx="1100" cy="530" r="150" fill="#7c3aed" opacity="0.1"/>
  <circle cx="900" cy="100" r="80" fill="#a855f7" opacity="0.08"/>
  
  <!-- Logo -->
  <circle cx="200" cy="315" r="80" fill="#000000" stroke="url(#textGradient)" stroke-width="4"/>
  <text x="170" y="330" font-family="sans-serif" font-size="40" font-weight="600" fill="#ffffff">aj</text>
  
  <!-- Main Text -->
  <text x="320" y="260" font-family="sans-serif" font-size="64" font-weight="bold" fill="#ffffff">Dev Area</text>
  <text x="320" y="320" font-family="sans-serif" font-size="36" font-weight="500" fill="url(#textGradient)">Alfian Jack Portfolio</text>
  <text x="320" y="370" font-family="sans-serif" font-size="28" font-weight="400" fill="#e5e7eb">Frontend Developer - Membangun pengalaman web yang indah</text>
  <text x="320" y="405" font-family="sans-serif" font-size="28" font-weight="400" fill="#e5e7eb">dan interaktif</text>
  
  <!-- Code brackets -->
  <text x="320" y="470" font-family="monospace" font-size="48" font-weight="bold" fill="url(#textGradient)">&lt;</text>
  <text x="380" y="470" font-family="monospace" font-size="48" font-weight="bold" fill="url(#textGradient)">/&gt;</text>
</svg>